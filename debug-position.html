<!DOCTYPE html>
<html>
<head>
    <title>Position Debug</title>
    <style>
        body { background: #333; padding: 20px; font-family: sans-serif; }
        h2 { color: white; }
        .container { display: flex; gap: 20px; }
        .panel { background: white; }
        .stage {
            width: 640px;
            height: 480px;
            position: relative;
            overflow: hidden;
            border: 2px solid blue;
        }
        .element {
            position: absolute;
            left: 0;
            top: 0;
        }
        .marker {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            margin: -5px;
            z-index: 9999;
        }
        .info { color: white; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h2>Position Debug - Frame 100</h2>
    <div class="container">
        <div>
            <h3 style="color:white">Original Frame 100</h3>
            <div class="panel">
                <img src="intro/frames/100.png" style="width:640px;height:480px;">
            </div>
        </div>
        <div>
            <h3 style="color:white">Our Render</h3>
            <div class="panel">
                <div class="stage" id="stage"></div>
            </div>
        </div>
    </div>
    <div class="info" id="info"></div>

    <script>
        async function loadShape(id) {
            const response = await fetch(`intro/shapes/${id}.svg`);
            return await response.text();
        }

        async function test() {
            const stage = document.getElementById('stage');
            const info = document.getElementById('info');

            // Load timeline data
            const response = await fetch('intro-timeline.json');
            const data = await response.json();

            // Build display list at frame 100
            const displayList = {};
            for (let i = 0; i <= 100; i++) {
                const frame = data.timeline[i];
                for (const d of frame.remove) {
                    delete displayList[d];
                }
                for (const p of frame.place) {
                    const depth = p.d;
                    if (p.m && displayList[depth]) {
                        if (p.t) displayList[depth].t = p.t;
                        if (p.ct) displayList[depth].ct = p.ct;
                        // Character replacement during move
                        if (p.c) {
                            displayList[depth].c = p.c;
                            if (p.cd !== undefined) displayList[depth].cd = p.cd;
                        }
                    } else if (p.c) {
                        displayList[depth] = { c: p.c, t: p.t, ct: p.ct, cd: p.cd };
                    }
                }
            }

            let infoText = 'Display list at frame 100:\n';

            // Render each element
            for (const [depth, obj] of Object.entries(displayList).sort((a,b) => a[0] - b[0])) {
                // Skip mask shapes
                if (obj.cd) {
                    infoText += `Depth ${depth}: MASK (clips to depth ${obj.cd})\n`;
                    continue;
                }

                const svgText = await loadShape(obj.c);
                if (!svgText) continue;

                const wrapper = document.createElement('div');
                wrapper.className = 'element';

                // Parse SVG and make IDs unique to prevent gradient collisions
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgText, 'image/svg+xml');
                const svg = doc.documentElement;
                const prefix = `s${obj.c}_`;

                // Find all elements with IDs and rename them
                const elementsWithIds = svg.querySelectorAll('[id]');
                const idMap = new Map();
                elementsWithIds.forEach(el => {
                    const oldId = el.getAttribute('id');
                    const newId = prefix + oldId;
                    el.setAttribute('id', newId);
                    idMap.set(oldId, newId);
                });

                // Update all url(#...) references in fill, stroke, clip-path, mask attributes
                const allElements = svg.querySelectorAll('*');
                allElements.forEach(el => {
                    ['fill', 'stroke', 'clip-path', 'mask', 'filter'].forEach(attr => {
                        const val = el.getAttribute(attr);
                        if (val && val.startsWith('url(#')) {
                            const oldId = val.match(/url\(#([^)]+)\)/)?.[1];
                            if (oldId && idMap.has(oldId)) {
                                el.setAttribute(attr, `url(#${idMap.get(oldId)})`);
                            }
                        }
                    });
                    // Also check xlink:href and href
                    ['href', 'xlink:href'].forEach(attr => {
                        const val = el.getAttribute(attr);
                        if (val && val.startsWith('#')) {
                            const oldId = val.substring(1);
                            if (idMap.has(oldId)) {
                                el.setAttribute(attr, `#${idMap.get(oldId)}`);
                            }
                        }
                    });
                });

                wrapper.appendChild(svg);
                wrapper.style.zIndex = depth;

                // Extract SVG offset
                const g = wrapper.querySelector('g[transform]');
                let offsetX = 0, offsetY = 0;
                if (g) {
                    const transform = g.getAttribute('transform');
                    const match = transform.match(/matrix\([^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*([^,]+),\s*([^)]+)\)/);
                    if (match) {
                        offsetX = parseFloat(match[1]);
                        offsetY = parseFloat(match[2]);
                    }
                }

                const t = obj.t || { sx: 1, sy: 1, r0: 0, r1: 0, tx: 0, ty: 0 };

                // The SVG's g transform positions content relative to registration point
                // Registration point is at (offsetX, offsetY) in SVG local coordinates
                // Set transform-origin to rotate/scale around registration point
                wrapper.style.transformOrigin = `${offsetX}px ${offsetY}px`;

                // With transform-origin, CSS applies: translate(origin) * matrix * translate(-origin)
                // This puts the registration point at (tx + offsetX, ty + offsetY)
                // We want it at (tx, ty), so adjust the translation
                const adjTx = t.tx - offsetX;
                const adjTy = t.ty - offsetY;

                wrapper.style.transform = `matrix(${t.sx}, ${t.r0}, ${t.r1}, ${t.sy}, ${adjTx}, ${adjTy})`;

                if (obj.ct && obj.ct.am !== undefined) {
                    wrapper.style.opacity = obj.ct.am;
                }

                stage.appendChild(wrapper);

                // Add marker at the target position (where registration point should be)
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.style.left = t.tx + 'px';
                marker.style.top = t.ty + 'px';
                marker.title = `Char ${obj.c} target: (${t.tx.toFixed(0)}, ${t.ty.toFixed(0)})`;
                stage.appendChild(marker);

                infoText += `Depth ${depth}: char ${obj.c} at (${t.tx.toFixed(0)}, ${t.ty.toFixed(0)}) offset (${offsetX}, ${offsetY})\n`;
            }

            info.textContent = infoText;
        }

        test();
    </script>
</body>
</html>
