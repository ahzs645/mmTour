<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Tour - Intro (Animated)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .player-container {
            position: relative;
            background: #fff;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        #stage {
            position: relative;
            width: 640px;
            height: 480px;
            overflow: hidden;
            background: #fff;
        }

        #stage .element {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            pointer-events: none;
        }

        #stage img {
            display: block;
            max-width: none;
        }

        #stage svg {
            display: block;
            overflow: visible;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: linear-gradient(to bottom, #0a246a, #003399);
        }

        .controls button {
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #003366;
            border-radius: 3px;
            background: linear-gradient(to bottom, #fff, #ddd);
            color: #003366;
            font-weight: bold;
            transition: all 0.2s;
            min-width: 80px;
        }

        .controls button:hover {
            background: linear-gradient(to bottom, #fff, #cce0ff);
        }

        .progress-container {
            flex: 1;
            max-width: 300px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #001a4d;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to bottom, #6699ff, #3366cc);
            width: 0%;
            transition: width 0.05s linear;
        }

        .time-display {
            color: #fff;
            font-size: 12px;
            min-width: 100px;
            text-align: center;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-text {
            color: #003399;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .loading-bar {
            width: 300px;
            height: 16px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .loading-fill {
            height: 100%;
            background: linear-gradient(to bottom, #3399ff, #0066cc);
            width: 0%;
            transition: width 0.1s;
        }

        .loading-status {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .debug-info {
            color: #aaa;
            font-size: 11px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- SVG filters for color transforms -->
    <svg width="0" height="0" style="position:absolute">
        <defs id="color-filters"></defs>
    </svg>

    <h1>Windows XP Tour - Intro</h1>

    <div class="player-container">
        <div class="loading-overlay" id="loading">
            <div class="loading-text">Loading Windows XP Tour...</div>
            <div class="loading-bar">
                <div class="loading-fill" id="loading-fill"></div>
            </div>
            <div class="loading-status" id="loading-status">Initializing...</div>
        </div>

        <div id="stage"></div>

        <div class="controls">
            <button id="play-btn">Play</button>
            <button id="restart-btn">Restart</button>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            <span class="time-display" id="time-display">Frame 0 / 0</span>
        </div>
    </div>

    <div class="debug-info" id="debug-info"></div>

    <script>
        // SWF to HTML Animation Engine
        class SWFPlayer {
            constructor(stageElement) {
                this.stage = stageElement;
                this.fps = 15;
                this.frameDuration = 1000 / this.fps;
                this.totalFrames = 0;
                this.currentFrame = 0;
                this.isPlaying = false;
                this.lastFrameTime = 0;
                this.animationId = null;

                // Timeline data
                this.timeline = [];
                this.characters = {};
                this.displayList = {}; // depth -> display object

                // Loaded assets
                this.svgCache = {};
                this.imageCache = {};
                this.availableAssets = { shapes: [], images: [] };

                // Audio
                this.sounds = {};
            }

            async init() {
                this.updateLoadingStatus('Loading timeline data...');
                await this.loadTimeline();

                this.updateLoadingStatus('Loading shapes and images...');
                await this.loadAssets();

                this.updateLoadingStatus('Loading audio...');
                await this.loadAudio();

                this.updateLoadingStatus('Ready!');
                document.getElementById('loading').style.display = 'none';

                // Add a test element to verify rendering works
                const testDiv = document.createElement('div');
                testDiv.style.cssText = 'position:absolute; left:10px; top:10px; background:red; color:white; padding:5px; z-index:9999; font-size:12px;';
                testDiv.textContent = 'Test: SVGs loaded = ' + Object.keys(this.svgCache).length;
                this.stage.appendChild(testDiv);

                // Render first frame
                this.renderFrame(0);
                console.log('Initial render complete. Display list size:', Object.keys(this.displayList).length);
            }

            updateLoadingStatus(status) {
                document.getElementById('loading-status').textContent = status;
            }

            updateLoadingProgress(percent) {
                document.getElementById('loading-fill').style.width = percent + '%';
            }

            async loadTimeline() {
                try {
                    const response = await fetch('intro-timeline.json');
                    const data = await response.json();

                    this.fps = data.meta.fps;
                    this.frameDuration = 1000 / this.fps;
                    this.totalFrames = data.meta.frames;
                    this.stageWidth = data.meta.width;
                    this.stageHeight = data.meta.height;

                    this.characters = data.characters;
                    this.timeline = data.timeline;
                    this.availableAssets = data.assets;

                    console.log(`Loaded timeline: ${this.totalFrames} frames, ${Object.keys(this.characters).length} characters`);
                    this.updateLoadingProgress(20);

                } catch (error) {
                    console.error('Error loading timeline:', error);
                    this.updateLoadingStatus('Error: ' + error.message);
                    throw error;
                }
            }

            async loadAssets() {
                const shapesDir = 'intro/shapes/';
                const imagesDir = 'intro/images/';

                // Load shapes
                let loaded = 0;
                const totalShapes = this.availableAssets.shapes.length;

                for (const shapeId of this.availableAssets.shapes) {
                    try {
                        const response = await fetch(`${shapesDir}${shapeId}.svg`);
                        if (response.ok) {
                            const svgText = await response.text();
                            this.svgCache[shapeId] = svgText;
                        }
                    } catch (e) {
                        // Shape not found
                    }
                    loaded++;
                    this.updateLoadingProgress(20 + (loaded / totalShapes) * 40);
                }

                // Load images
                for (const imgInfo of this.availableAssets.images) {
                    const img = new Image();
                    img.src = `${imagesDir}${imgInfo.id}${imgInfo.ext}`;
                    this.imageCache[imgInfo.id] = img;
                }

                console.log(`Loaded ${Object.keys(this.svgCache).length} shapes, ${Object.keys(this.imageCache).length} images`);
                this.updateLoadingProgress(70);
            }

            async loadAudio() {
                const soundsDir = 'intro/sounds/';
                const soundFiles = ['1_1.mp3', '2_2.mp3', '3_3.mp3', '4_4.mp3', '5_5.mp3',
                                    '6_6.mp3', '7_7.mp3', '8_8.mp3', '9_9.mp3', '10_10.mp3',
                                    '11_11.mp3', '12_12.mp3'];

                for (const file of soundFiles) {
                    try {
                        const audio = new Audio(`${soundsDir}${file}`);
                        audio.preload = 'auto';
                        const id = file.split('_')[0];
                        this.sounds[id] = audio;
                    } catch (e) {
                        // Sound not found
                    }
                }

                this.updateLoadingProgress(100);
            }

            renderFrame(frameIndex) {
                if (frameIndex < 0 || frameIndex >= this.totalFrames) return;

                // When seeking backwards, rebuild from scratch
                if (frameIndex < this.currentFrame || frameIndex === 0) {
                    this.displayList = {};
                    this.stage.innerHTML = '';

                    for (let i = 0; i <= frameIndex; i++) {
                        this.processFrame(i, false);
                    }
                } else {
                    // Process frames incrementally
                    for (let i = this.currentFrame + 1; i <= frameIndex; i++) {
                        this.processFrame(i, true);
                    }
                }

                this.currentFrame = frameIndex;
                this.updateDisplay();
                this.updateUI();
            }

            processFrame(frameIndex, updateDOM = true) {
                const frame = this.timeline[frameIndex];
                if (!frame) return;

                // Remove objects
                for (const depth of frame.remove) {
                    if (this.displayList[depth]) {
                        if (updateDOM && this.displayList[depth].element) {
                            this.displayList[depth].element.remove();
                        }
                        delete this.displayList[depth];
                    }
                }

                // Place/update objects
                for (const place of frame.place) {
                    const depth = place.d;

                    if (place.m && this.displayList[depth]) {
                        // Move/update existing object
                        if (place.t) {
                            this.displayList[depth].transform = place.t;
                        }
                        if (place.ct) {
                            this.displayList[depth].colorTransform = place.ct;
                        }
                        // Character replacement during move - remove old element to force recreation
                        if (place.c && place.c !== this.displayList[depth].characterId) {
                            if (this.displayList[depth].element) {
                                this.displayList[depth].element.remove();
                            }
                            this.displayList[depth].characterId = place.c;
                            this.displayList[depth].element = null;
                            this.displayList[depth].clipDepth = place.cd || null;
                        }
                    } else if (place.c) {
                        // Place new object
                        this.displayList[depth] = {
                            characterId: place.c,
                            transform: place.t || { sx: 1, sy: 1, r0: 0, r1: 0, tx: 0, ty: 0 },
                            colorTransform: place.ct,
                            clipDepth: place.cd || null, // If set, this is a mask for depths up to clipDepth
                            element: null
                        };
                    }
                }
            }

            updateDisplay() {
                // Sort by depth
                const depths = Object.keys(this.displayList).map(Number).sort((a, b) => a - b);

                // Build clip depth ranges - masks clip everything from their depth+1 to clipDepth
                const clipRanges = [];
                for (const depth of depths) {
                    const obj = this.displayList[depth];
                    if (obj?.clipDepth) {
                        clipRanges.push({
                            start: depth + 1,
                            end: obj.clipDepth,
                            maskTransform: obj.transform
                        });
                    }
                }

                let created = 0, updated = 0;
                for (const depth of depths) {
                    const obj = this.displayList[depth];
                    if (!obj) continue;

                    // Skip mask shapes (clipDepth means this is a mask, not content)
                    if (obj.clipDepth) {
                        continue;
                    }

                    // Check if this depth is inside a clipped range
                    // For now, we'll hide elements in clipped ranges that are outside visible stage
                    const isClipped = clipRanges.some(r => depth >= r.start && depth <= r.end);
                    if (isClipped && obj.transform) {
                        const t = obj.transform;
                        // If the element is positioned far outside the stage, skip it
                        // This handles reflections that are meant to be clipped
                        if (t.ty > 500 || t.ty < -200 || t.tx > 700 || t.tx < -200) {
                            if (obj.element) {
                                obj.element.style.display = 'none';
                            }
                            continue;
                        }
                    }

                    // Create element if needed
                    if (!obj.element) {
                        obj.element = this.createElement(obj.characterId, depth);
                        if (obj.element) {
                            this.stage.appendChild(obj.element);
                            created++;
                        }
                    }

                    // Make sure element is visible (may have been hidden previously)
                    if (obj.element) {
                        obj.element.style.display = '';
                    }

                    // Update transform
                    if (obj.element && obj.transform) {
                        const t = obj.transform;

                        // Get SVG's registration point offset (from internal <g transform>)
                        const offsetX = parseFloat(obj.element.dataset.offsetX) || 0;
                        const offsetY = parseFloat(obj.element.dataset.offsetY) || 0;

                        // CSS transform-origin is set to (offsetX, offsetY) in createElement
                        // This means transforms happen around the registration point
                        // With transform-origin, CSS applies: translate(origin) * matrix * translate(-origin)
                        // For the origin point, this results in: (tx + offsetX, ty + offsetY)
                        // We want the registration point at (tx, ty), so adjust:
                        const adjustedTx = t.tx - offsetX;
                        const adjustedTy = t.ty - offsetY;

                        const transform = `matrix(${t.sx}, ${t.r0}, ${t.r1}, ${t.sy}, ${adjustedTx}, ${adjustedTy})`;
                        obj.element.style.transform = transform;

                        // Apply color transform
                        if (obj.colorTransform) {
                            const ct = obj.colorTransform;
                            const am = ct.am !== undefined ? ct.am : 1;
                            const rm = ct.rm !== undefined ? ct.rm : 1;
                            const gm = ct.gm !== undefined ? ct.gm : 1;
                            const bm = ct.bm !== undefined ? ct.bm : 1;

                            // Apply opacity
                            obj.element.style.opacity = Math.max(0, Math.min(1, am));

                            // Apply color matrix filter for RGB transforms
                            if (rm !== 1 || gm !== 1 || bm !== 1) {
                                // Create or get unique filter for this color combo
                                const filterId = `color-${depth}`;
                                let filter = document.getElementById(filterId);
                                if (!filter) {
                                    filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
                                    filter.id = filterId;
                                    document.getElementById('color-filters').appendChild(filter);
                                }
                                // feColorMatrix multiplies each channel
                                filter.innerHTML = `<feColorMatrix type="matrix" values="${rm} 0 0 0 0  0 ${gm} 0 0 0  0 0 ${bm} 0 0  0 0 0 1 0"/>`;
                                obj.element.style.filter = `url(#${filterId})`;
                            } else {
                                obj.element.style.filter = '';
                            }
                        } else {
                            obj.element.style.opacity = 1;
                            obj.element.style.filter = '';
                        }
                        updated++;
                    }
                }

                // Debug every 10 frames
                if (this.currentFrame % 10 === 0) {
                    const sample = this.displayList[5]; // depth 5 is shape 15
                    const pos = sample?.transform ? `tx=${sample.transform.tx.toFixed(0)}` : 'no transform';
                    console.log(`Frame ${this.currentFrame}: ${updated} elements, shape15 ${pos}`);
                }
            }

            createElement(characterId, depth) {
                const wrapper = document.createElement('div');
                wrapper.className = 'element';
                wrapper.dataset.characterId = characterId;
                wrapper.dataset.depth = depth;
                wrapper.style.zIndex = depth;

                // Try to find as SVG shape
                if (this.svgCache[characterId]) {
                    // Parse SVG and make IDs unique to prevent collisions
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(this.svgCache[characterId], 'image/svg+xml');
                    const svg = doc.documentElement;
                    const prefix = `s${characterId}_`;

                    // Find all elements with IDs and rename them
                    const elementsWithIds = svg.querySelectorAll('[id]');
                    const idMap = new Map();
                    elementsWithIds.forEach(el => {
                        const oldId = el.getAttribute('id');
                        const newId = prefix + oldId;
                        el.setAttribute('id', newId);
                        idMap.set(oldId, newId);
                    });

                    // Update all url(#...) references in fill, stroke, clip-path, mask attributes
                    const allElements = svg.querySelectorAll('*');
                    allElements.forEach(el => {
                        ['fill', 'stroke', 'clip-path', 'mask', 'filter'].forEach(attr => {
                            const val = el.getAttribute(attr);
                            if (val && val.startsWith('url(#')) {
                                const oldId = val.match(/url\(#([^)]+)\)/)?.[1];
                                if (oldId && idMap.has(oldId)) {
                                    el.setAttribute(attr, `url(#${idMap.get(oldId)})`);
                                }
                            }
                        });
                        // Also check xlink:href and href
                        ['href', 'xlink:href'].forEach(attr => {
                            const val = el.getAttribute(attr);
                            if (val && val.startsWith('#')) {
                                const oldId = val.substring(1);
                                if (idMap.has(oldId)) {
                                    el.setAttribute(attr, `#${idMap.get(oldId)}`);
                                }
                            }
                        });
                    });

                    wrapper.appendChild(svg);

                    // Extract the SVG's internal transform offset
                    // This represents the shape's registration point
                    const g = svg.querySelector('g[transform]');
                    if (g) {
                        const transform = g.getAttribute('transform');
                        const match = transform.match(/matrix\([^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*([^,]+),\s*([^)]+)\)/);
                        if (match) {
                            const offsetX = parseFloat(match[1]);
                            const offsetY = parseFloat(match[2]);
                            // Use the offset as the transform origin
                            // This makes the registration point the center of transformation
                            wrapper.style.transformOrigin = `${offsetX}px ${offsetY}px`;
                            wrapper.dataset.offsetX = offsetX;
                            wrapper.dataset.offsetY = offsetY;
                        }
                    }

                    return wrapper;
                }

                // Try to find as image
                if (this.imageCache[characterId]) {
                    const img = this.imageCache[characterId].cloneNode();
                    wrapper.appendChild(img);
                    return wrapper;
                }

                // Character not found - might be a sprite or unsupported type
                return null;
            }

            play() {
                if (this.isPlaying) return;
                if (this.currentFrame >= this.totalFrames - 1) {
                    this.currentFrame = 0;
                    this.displayList = {};
                    this.stage.innerHTML = '';
                }
                this.isPlaying = true;
                this.lastFrameTime = performance.now();
                this.animationId = requestAnimationFrame((time) => this.animate(time));
                this.updateUI();
            }

            pause() {
                this.isPlaying = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.updateUI();
            }

            restart() {
                this.pause();
                this.currentFrame = 0;
                this.displayList = {};
                this.stage.innerHTML = '';
                this.renderFrame(0);
            }

            animate(currentTime) {
                if (!this.isPlaying) return;

                const elapsed = currentTime - this.lastFrameTime;

                if (elapsed >= this.frameDuration) {
                    this.lastFrameTime = currentTime - (elapsed % this.frameDuration);

                    const nextFrame = this.currentFrame + 1;

                    if (nextFrame >= this.totalFrames) {
                        this.pause();
                        return;
                    }

                    // Process and render the next frame
                    this.renderFrame(nextFrame);
                }

                this.animationId = requestAnimationFrame((time) => this.animate(time));
            }

            seek(frameIndex) {
                this.pause();
                this.renderFrame(Math.min(Math.max(0, frameIndex), this.totalFrames - 1));
            }

            updateUI() {
                const progress = this.totalFrames > 0 ? (this.currentFrame / this.totalFrames) * 100 : 0;
                document.getElementById('progress-fill').style.width = progress + '%';

                const currentSec = (this.currentFrame / this.fps).toFixed(1);
                const totalSec = (this.totalFrames / this.fps).toFixed(1);
                document.getElementById('time-display').textContent =
                    `${currentSec}s / ${totalSec}s`;

                document.getElementById('play-btn').textContent = this.isPlaying ? 'Pause' : 'Play';

                // Debug info
                const activeElements = Object.keys(this.displayList).length;
                document.getElementById('debug-info').textContent =
                    `Frame ${this.currentFrame}/${this.totalFrames} | Active: ${activeElements} | Shapes: ${Object.keys(this.svgCache).length}`;
            }
        }

        // Initialize player
        let player;

        document.addEventListener('DOMContentLoaded', async () => {
            const stage = document.getElementById('stage');
            player = new SWFPlayer(stage);

            try {
                await player.init();
            } catch (error) {
                console.error('Failed to initialize player:', error);
            }

            // Controls
            document.getElementById('play-btn').addEventListener('click', () => {
                if (player.isPlaying) {
                    player.pause();
                } else {
                    player.play();
                }
            });

            document.getElementById('restart-btn').addEventListener('click', () => {
                player.restart();
            });

            document.getElementById('progress-bar').addEventListener('click', (e) => {
                const rect = e.target.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seek(Math.floor(percent * player.totalFrames));
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (player.isPlaying) {
                        player.pause();
                    } else {
                        player.play();
                    }
                } else if (e.code === 'KeyR') {
                    player.restart();
                } else if (e.code === 'ArrowLeft') {
                    player.seek(player.currentFrame - 15);
                } else if (e.code === 'ArrowRight') {
                    player.seek(player.currentFrame + 15);
                }
            });
        });
    </script>
</body>
</html>
