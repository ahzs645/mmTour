  pointer-events: none;
  z-index: 10;
  overflow: hidden;
}

.nav-gradient {

  top: 0;
  left: 0;

  height: 100%;

}

.nav-curves {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;

}

  background: #4488bb;
}

  margin: 0;

html, body, #root {
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background:
    radial-gradient(circle at top, rgba(52, 128, 255, 0.18), transparent 34%),
    linear-gradient(180deg, #0e1220 0%, #151a2d 100%);
  color: #fff;
}

.app {
  min-height: 100vh;
  padding: 24px;
}

.app-shell {
  display: grid;
  gap: 16px;
}

.app-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.app-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.app-subtitle {
  color: rgba(255, 255, 255, 0.72);
  font-size: 14px;
  margin-top: 4px;
}

.app-mode-switch {
  display: flex;
  gap: 8px;
}

.app-mode-btn {
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(18, 24, 42, 0.9);
  color: rgba(255, 255, 255, 0.88);
}

.app-mode-btn.active {
  background: linear-gradient(135deg, #1d63c7, #2c95f2);
  border-color: rgba(114, 182, 255, 0.7);
  color: #fff;
}

.app-compare-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  align-items: start;
}

.app-pane {
  display: grid;
  gap: 10px;
}

.app-pane-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.72);
}

.ruffle-shell {
  display: flex;
  justify-content: center;
  width: 100%;
}

.reference-frame-shell {
  display: flex;
  justify-content: center;
  width: 100%;
}

.reference-frame-stage {
  position: relative;
  width: min(100%, 720px);
  aspect-ratio: 4 / 3;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
}

.reference-frame-image {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  image-rendering: auto;
}

.reference-frame-meta {
  position: absolute;
  right: 12px;
  bottom: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(12, 18, 32, 0.82);
  color: rgba(255, 255, 255, 0.88);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.ruffle-stage-frame {
  position: relative;
  width: min(100%, 720px);
  aspect-ratio: 4 / 3;
  background: #ffffff;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
}

.ruffle-stage-host {
  width: 100%;
  height: 100%;
}

.ruffle-stage-host ruffle-player,
.ruffle-stage-host embed,
.ruffle-stage-host object {
  width: 100%;
  height: 100%;
  display: block;
}

.ruffle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.92);
  color: #1e2d44;
}

.ruffle-overlay-error {
  color: #8b1e1e;
}

.ruffle-overlay-title {
  font-size: 22px;
  font-weight: 700;
}

.ruffle-overlay-copy {
  font-size: 14px;
  color: inherit;
  opacity: 0.75;
}

@media (max-width: 900px) {
  .app {
    padding: 16px;
  }

  .app-toolbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .ruffle-stage-frame {
    width: min(100%, calc(100vw - 32px));
  }

  .app-compare-grid {
    grid-template-columns: 1fr;
  }
}
